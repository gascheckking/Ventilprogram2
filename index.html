<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Underhåll Botkyrka</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;}
.hidden{display:none;}

#nav{display:flex;background:#000;}
#nav button{flex:1;padding:12px;background:#222;color:#fff;border:none;}

.page{padding:10px;height:calc(100vh - 50px);overflow:auto;}

input,select,textarea,button{
width:100%;padding:10px;margin-top:8px;font-size:16px;
}

#saveBtn{background:#28a745;font-size:18px;}

#map{height:300px;margin-top:10px;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #444;padding:5px;font-size:12px;}
tr:hover{background:#333;cursor:pointer;}

.orange{color:orange;}
.red{color:red;}
.blue{color:cyan;}
.gray{color:gray;}

</style>
</head>

<body>

<div id="nav">
<button onclick="show('field')">📸 Fältläge</button>
<button onclick="show('admin')">🧠 Admin</button>
</div>

<!-- ================= FIELD ================= -->
<div id="field" class="page">

<h2>🏛️ Underhållsprogram</h2>
<p>Botkyrka Kommun · VA-enheten</p>

<select id="area">
<option>Tullinge</option>
<option>Tumba</option>
<option>Norra</option>
<option>Vårsta</option>
</select>

<input id="id" placeholder="VAV2392">

<select id="status">
<option value="trasig">Ventil Trasig</option>
<option value="ej">Ej kontrollerad</option>
<option value="trög">Ventil trög</option>
<option value="övertäckt">Övertäckt</option>
<option value="betäckning">Betäckning Defekt</option>
<option value="hittarEj">Hittar ej</option>
<option value="distanserad">Distanserad</option>
</select>

<select id="notePreset">
<option value="">-- Notering snabbval --</option>
<option>Sne/Snurrar</option>
<option>Saknas nyckelstång</option>
<option>Bil i vägen</option>
<option>Bråte</option>
<option>2 Gubbar</option>
<option>Asfalt</option>
<option>Jord</option>
<option>Buskage</option>
<option>Höjas</option>
<option>Trasigt lock</option>
<option>Måste mätas in</option>
</select>

<textarea id="note" placeholder="Extra notering..."></textarea>

<select id="typ">
<option>VAV</option>
<option>VBP</option>
<option>VSP</option>
<option>SV</option>
</select>

<input type="file" id="foto" accept="image/*" capture="environment">
<img id="preview" style="width:100%;margin-top:10px;">

<button id="saveBtn">💾 SPARA</button>

</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="page hidden">

<h2>🧠 Adminläge</h2>

<select id="filter">
<option value="all">Visa alla</option>
<option value="trög">Endast tröga</option>
<option value="trasig">Endast trasiga</option>
<option value="övertäckt">Övertäckta</option>
<option value="hittarEj">Hittar ej</option>
</select>

<input id="search" placeholder="Sök VAV...">

<div id="stats"></div>

<div id="map"></div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Status</th>
<th>Typ</th>
<th>Område</th>
<th>Notering</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= DATA =================
let data = JSON.parse(localStorage.getItem("va_data")||"[]");

// ================= NAV =================
function show(p){
field.classList.add("hidden");
admin.classList.add("hidden");
document.getElementById(p).classList.remove("hidden");

if(p==="admin"){
setTimeout(initMap,200);
render();
}
}

// ================= FOTO =================
foto.onchange = e=>{
const reader = new FileReader();
reader.onload = ev=>preview.src = ev.target.result;
reader.readAsDataURL(e.target.files[0]);
}

// ================= SAVE =================
saveBtn.onclick = ()=>{
navigator.geolocation.getCurrentPosition(pos=>{

const obj = {
id:id.value,
status:status.value,
note:(notePreset.value+" "+note.value).trim(),
typ:typ.value,
area:area.value,
lat:pos.coords.latitude,
lng:pos.coords.longitude,
foto:preview.src
};

data.push(obj);
localStorage.setItem("va_data",JSON.stringify(data));

alert("Sparad");

id.value="";
note.value="";
preview.src="";

});
}

// ================= MAP =================
let map;
let markers=[];

function initMap(){
if(map) return;

map = L.map('map').setView([59.215,17.867],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// ================= RENDER =================
function render(){

const f = filter.value;
const s = search.value.toLowerCase();

table.innerHTML="";
markers.forEach(m=>map.removeLayer(m));
markers=[];

let count=0;

data.forEach(v=>{

if(f!=="all" && v.status!==f) return;
if(!v.id.toLowerCase().includes(s)) return;

count++;

const color = {
trög:"orange",
trasig:"red",
övertäckt:"blue",
hittarEj:"gray"
}[v.status]||"green";

const m = L.circleMarker([v.lat,v.lng],{
radius:8,
color:color
}).addTo(map);

m.bindPopup(`<b>${v.id}</b><br>${v.status}<br>${v.note}`);

markers.push(m);

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${v.id}</td>
<td class="${color}">${v.status}</td>
<td>${v.typ}</td>
<td>${v.area}</td>
<td>${v.note}</td>
`;

table.appendChild(tr);

});

stats.innerHTML = `Totalt: ${count}`;

}

// ================= EVENTS =================
filter.onchange = render;
search.oninput = render;

// ================= INIT =================
show("field");

</script>

</body>
</html>
