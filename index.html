<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Ventilrapport V2.1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0f0f0f; color:#fff; }
#map { height: 35vh; }
.panel { padding:12px; background:#181818; }

input, textarea {
  width:100%; padding:12px; border-radius:10px; border:none; margin-top:8px; font-size:15px;
}

button {
  padding:14px; border:none; border-radius:10px; font-size:15px;
}

.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.red{background:#ff4d4d;} .orange{background:#ff9f43;} .yellow{background:#ffd93d;color:#000;} .black{background:#555;} .green{background:#4cd137;}

.save-btn{width:100%; background:#00a8ff; margin-top:8px;}

.card{background:#222; padding:10px; border-radius:10px; margin-top:8px;}

.filter-bar{display:flex; gap:6px; overflow-x:auto;}
.filter-btn{background:#333; padding:8px; border-radius:8px; white-space:nowrap;}
.active{outline:2px solid #00a8ff;}

.toggle-map{background:#444; width:100%; margin-bottom:6px;}

</style>
</head>

<body>

<button class="toggle-map" onclick="toggleMap()">Visa/Dölj karta</button>
<div id="map"></div>

<div class="panel">
  <input id="search" placeholder="VAV ID">

  <div class="grid">
    <button class="red" onclick="setStatus('Trasig')">Trasig</button>
    <button class="orange" onclick="setStatus('Trög')">Trög</button>
    <button class="yellow" onclick="setStatus('Ej kontrollerad')">Ej kontrollerad</button>
    <button class="black" onclick="setStatus('Hittas ej')">Hittas ej</button>
    <button class="green" onclick="setStatus('OK')">OK</button>
  </div>

  <textarea id="note" placeholder="Notering"></textarea>
  <button class="save-btn" onclick="saveReport()">Spara</button>
</div>

<div class="panel">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('ALL', this)">Alla</button>
    <button class="filter-btn" onclick="setFilter('Trasig', this)">Trasig</button>
    <button class="filter-btn" onclick="setFilter('Trög', this)">Trög</button>
  </div>

  <div id="list"></div>
</div>

<script>
let map = L.map('map', { zoomControl:false }).setView([59.17,17.82], 13);

// Begränsa till Botkyrka (bbox)
let bounds = [[59.1,17.7],[59.25,17.95]];
map.setMaxBounds(bounds);
map.fitBounds(bounds);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  noWrap:true
}).addTo(map);

let reports = JSON.parse(localStorage.getItem('reports')||'[]');
let currentStatus=null;
let markers=[];
let currentFilter='ALL';
let mapVisible=true;

function toggleMap(){
  mapVisible=!mapVisible;
  document.getElementById('map').style.display = mapVisible?'block':'none';
}

function setStatus(s){ currentStatus=s; }

function getColor(s){
  return s==='Trasig'?'red':s==='Trög'?'orange':s==='Ej kontrollerad'?'yellow':s==='Hittas ej'?'black':'green';
}

function saveReport(){
  if(!currentStatus){ alert('Välj status'); return; }

  navigator.geolocation.getCurrentPosition(pos=>{
    let r={
      id: document.getElementById('search').value || 'Okänd',
      status: currentStatus,
      note: document.getElementById('note').value,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      date: new Date().toLocaleString()
    };

    reports.push(r);
    localStorage.setItem('reports', JSON.stringify(reports));

    draw();

    document.getElementById('note').value='';
    document.getElementById('search').value='';
    currentStatus=null;
  });
}

function draw(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  let list=document.getElementById('list');
  list.innerHTML='';

  reports.slice().reverse().forEach(r=>{
    if(currentFilter!=='ALL' && r.status!==currentFilter) return;

    let m=L.circleMarker([r.lat,r.lng],{color:getColor(r.status),radius:8}).addTo(map);
    markers.push(m);

    let div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<b>${r.id}</b><br>${r.status}<br>${r.note}`;
    list.appendChild(div);
  });
}

function setFilter(f, el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  draw();
}

draw();
</script>

</body>
</html>
