<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VA Rapport</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0f0f0f;--card:#1b1b1b;--accent:#00a8ff}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}
#map{height:30vh}
.panel{padding:10px;background:#181818}
input,textarea,button{width:100%;padding:12px;border:none;border-radius:10px;margin-top:8px;font-size:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.red{background:#ff4d4d}.orange{background:#ff9f43}.yellow{background:#ffd93d;color:#000}.black{background:#555}.green{background:#4cd137}
.save{background:var(--accent)}
.card{background:#222;padding:10px;border-radius:10px;margin-top:8px}
.row{display:flex;gap:6px;overflow:auto}
.btn{background:#333;padding:8px;border-radius:8px;white-space:nowrap}
.active{outline:2px solid var(--accent)}
</style>
</head>
<body>

<button onclick="toggleMap()">Karta</button>
<div id="map"></div>

<div class="panel">
<input id="id" placeholder="VAV ID" readonly />
<div style="display:flex;gap:6px;margin-top:8px">
<button onclick="prevVAV()">⬅️</button>
<button onclick="nextVAV()">➡️</button>
</div>

<div class="grid">
<button class="red" onclick="s('Trasig')">Trasig</button>
<button class="orange" onclick="s('Trög')">Trög</button>
<button class="yellow" onclick="s('Ej')">Ej koll</button>
<button class="black" onclick="s('Hittas ej')">Saknas</button>
<button class="green" onclick="s('OK')">OK</button>
</div>
<textarea id="note" placeholder="Notering"></textarea>
<button class="save" onclick="save()">Spara</button>
</div>

<div class="panel">
<div class="row">
<button class="btn active" onclick="f('ALL',this)">Alla</button>
<button class="btn" onclick="f('Trasig',this)">Trasig</button>
<button class="btn" onclick="f('Trög',this)">Trög</button>
</div>
<div id="list"></div>
</div>

<script>
let map=L.map('map',{zoomControl:false}).setView([59.17,17.82],13)
let bounds=[[59.1,17.7],[59.25,17.95]];map.setMaxBounds(bounds);map.fitBounds(bounds)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let data=JSON.parse(localStorage.getItem('r')||'[]'),m=[],st=null,filter='ALL',showMap=true

// Auto VAV lista (simulerad – ersätt med riktig senare)
let vavList=[];
for(let i=1201;i<1300;i++){vavList.push('VAV'+i)}
let currentIndex=0;

function setNextVAV(){
 document.getElementById('id').value=vavList[currentIndex]||'VAV?'
}

function nextVAV(){
 currentIndex=(currentIndex+1)%vavList.length
 setNextVAV()
}

function prevVAV(){
 currentIndex=(currentIndex-1+vavList.length)%vavList.length
 setNextVAV()
}

function toggleMap(){showMap=!showMap;map.getContainer().style.display=showMap?'block':'none'}
function s(x){st=x}
function col(x){return x=='Trasig'?'red':x=='Trög'?'orange':x=='Ej'?'yellow':x=='Hittas ej'?'black':'green'}

function save(){
 if(!st)return alert('Status')
 navigator.geolocation.getCurrentPosition(p=>{
  let r={id:id.value||'?',s:st,n:note.value,lat:p.coords.latitude,lng:p.coords.longitude}
  data.push(r);localStorage.setItem('r',JSON.stringify(data));setNextVAV();
draw();id.value='';note.value='';st=null
 })
}

function draw(){
 m.forEach(x=>map.removeLayer(x));m=[];list.innerHTML=''
 data.slice().reverse().forEach(r=>{
  if(filter!='ALL'&&r.s!=filter)return
  let mk=L.circleMarker([r.lat,r.lng],{color:col(r.s),radius:7}).addTo(map);m.push(mk)
  let d=document.createElement('div');d.className='card';d.innerHTML=`<b>${r.id}</b><br>${r.s}<br>${r.n}`;list.appendChild(d)
 })
}

function f(x,e){filter=x;document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));e.classList.add('active');draw()}

draw()
</script>

</body>
</html>
