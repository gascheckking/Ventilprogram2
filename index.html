<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Underhållssystem MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body,html{margin:0;height:100%;font-family:Arial;}
#container{display:flex;height:100vh;}
#sidebar{width:360px;background:#f4f4f4;padding:10px;overflow:auto;border-right:1px solid #ccc;}
#map{flex:1;}
input,select,button,textarea{width:100%;margin-top:5px;padding:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ccc;padding:5px;font-size:12px;}
tr:hover{background:#eee;cursor:pointer;}

.status-trög{color:orange;}
.status-trasig{color:red;}
.status-över{color:blue;}
.status-ej{color:gray;}
.status-ok{color:green;}

.legend div{margin:4px 0;}
</style>
</head>

<body>

<div id="container">

<div id="sidebar">
<h2>🏛️ VA Underhåll</h2>

<label>Filter</label>
<select id="filter">
<option value="all">Alla</option>
<option value="trög">Trög</option>
<option value="trasig">Trasig</option>
<option value="över">Överasfalterad</option>
<option value="ej">Ej kontrollerad</option>
</select>

<label>Sök</label>
<input id="search" placeholder="VAV...">

<button onclick="openModal()">➕ Ny ventil</button>

<div class="legend">
<b>Legend:</b>
<div class="status-trög">🟠 Trög</div>
<div class="status-trasig">🔴 Trasig</div>
<div class="status-över">🔵 Över</div>
<div class="status-ej">⚫ Ej kontrollerad</div>
</div>

<table>
<thead>
<tr>
<th>ID</th><th>Status</th><th>Typ</th><th>Notering</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<div id="map"></div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);">
<div style="background:white;padding:20px;margin:50px auto;width:300px;">
<h3>Ventil</h3>

<input id="id" placeholder="VAV123">
<select id="status">
<option value="trög">Trög</option>
<option value="trasig">Trasig</option>
<option value="över">Över</option>
<option value="ej">Ej kontrollerad</option>
</select>

<select id="typ">
<option>VAV</option>
<option>VBP</option>
<option>VSP</option>
<option>SV</option>
</select>

<textarea id="note" placeholder="Notering"></textarea>

<input type="file" id="foto">

<input type="hidden" id="lat">
<input type="hidden" id="lng">

<button onclick="save()">💾 Spara</button>
<button onclick="closeModal()">❌</button>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= STATE =================
let ventiler = JSON.parse(localStorage.getItem("ventiler")||"[]");

const map = L.map('map').setView([59.215,17.867],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

// ================= UTIL =================
function saveStorage(){
localStorage.setItem("ventiler",JSON.stringify(ventiler));
}

function getColor(status){
return {
trög:"orange",
trasig:"red",
över:"blue",
ej:"black"
}[status]||"green";
}

// ================= RENDER =================
function render(){
renderTable();
renderMap();
saveStorage();
}

function renderTable(){
const tbody=document.getElementById("table");
tbody.innerHTML="";

const filter=document.getElementById("filter").value;
const search=document.getElementById("search").value.toLowerCase();

ventiler.forEach(v=>{
if(filter!=="all" && v.status!==filter) return;
if(!v.id.toLowerCase().includes(search)) return;

const tr=document.createElement("tr");
tr.innerHTML=`
<td>${v.id}</td>
<td class="status-${v.status}">${v.status}</td>
<td>${v.typ}</td>
<td>${v.note}</td>
`;

tr.onclick=()=>openModal(v);

tbody.appendChild(tr);
});
}

function renderMap(){
markers.forEach(m=>map.removeLayer(m));
markers=[];

const filter=document.getElementById("filter").value;
const search=document.getElementById("search").value.toLowerCase();

ventiler.forEach(v=>{
if(filter!=="all" && v.status!==filter) return;
if(!v.id.toLowerCase().includes(search)) return;

const marker=L.circleMarker([v.lat,v.lng],{
radius:8,
color:getColor(v.status)
}).addTo(map);

marker.bindPopup(`<b>${v.id}</b><br>${v.status}<br>${v.note}`);

marker.on("click",()=>openModal(v));

markers.push(marker);
});
}

// ================= MODAL =================
function openModal(v=null){
document.getElementById("modal").style.display="block";

if(v){
id.value=v.id;
status.value=v.status;
typ.value=v.typ;
note.value=v.note;
lat.value=v.lat;
lng.value=v.lng;
}else{
id.value="";
status.value="trög";
typ.value="VAV";
note.value="";
}
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// ================= SAVE =================
function save(){
const v={
id:id.value,
status:status.value,
typ:typ.value,
note:note.value,
lat:parseFloat(lat.value)||map.getCenter().lat,
lng:parseFloat(lng.value)||map.getCenter().lng
};

const i=ventiler.findIndex(x=>x.id===v.id);

if(i>-1) ventiler[i]=v;
else ventiler.push(v);

closeModal();
render();
}

// ================= EVENTS =================
map.on("click",e=>{
lat.value=e.latlng.lat;
lng.value=e.latlng.lng;
openModal();
});

document.getElementById("filter").onchange=render;
document.getElementById("search").oninput=render;

// ================= INIT =================
render();

</script>

</body>
</html>
