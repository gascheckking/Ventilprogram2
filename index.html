<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Underhållsprogram Botkyrka VA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body, html { margin:0; padding:0; font-family: Arial,sans-serif; height:100%; }
  #container { display:flex; height:100vh; overflow:hidden; }
  /* SIDOPANEL */
  #sidebar { width: 320px; min-width: 280px; background:#f8f9fa; border-right:1px solid #ccc; display:flex; flex-direction:column; padding:10px; overflow-y:auto; }
  #sidebar h2 { margin:0 0 10px 0; font-size:18px; }
  #sidebar label { font-weight:bold; margin-top:10px; display:block; }
  #sidebar input, #sidebar select, #sidebar button { width:100%; margin-top:5px; padding:6px; box-sizing:border-box; }
  #filters button { margin-right:5px; margin-top:5px; padding:5px 8px; }
  /* KARTA */
  #map { flex:1; }
  /* TABELL */
  #table-container { max-height:250px; overflow-y:auto; margin-top:10px; }
  table { width:100%; border-collapse:collapse; }
  th, td { border:1px solid #ccc; padding:6px; text-align:left; font-size:13px; }
  th { background:#e9ecef; }
  /* Mobilvänlig scroll */
  @media(max-width:768px){
    #container { flex-direction:column; }
    #sidebar { width:100%; height:auto; max-height:40vh; }
    #map { height:50vh; }
    #table-container { max-height:40vh; }
  }
  /* Snabb markörform */
  .popup-form input, .popup-form select { width:100%; margin-top:5px; }
</style>
</head>
<body>
<div id="container">
  <div id="sidebar">
    <h2>Underhållsprogram</h2>
    <label>Område</label>
    <select id="areaSelect">
      <option value="tullinge">Tullinge</option>
      <option value="tumba">Tumba</option>
    </select>

    <label>Filter Status</label>
    <div id="filters">
      <button data-filter="trög">Ventil trög</button>
      <button data-filter="trasig">Ventil trasig</button>
      <button data-filter="ej">Ej kontrollerad</button>
      <button data-filter="all">Visa alla</button>
    </div>

    <label>Sök VAV</label>
    <input type="text" id="searchVAV" placeholder="VAV nummer...">

    <div id="summary">
      <h3>Sammanfattning</h3>
      <p id="summaryText">Foton med plats: 0<br>Projekt med plats: 0</p>
    </div>

    <div id="table-container">
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Notering</th>
            <th>Foto</th>
            <th>Rapportör</th>
          </tr>
        </thead>
        <tbody id="ventilTable">
          <!-- Dynamiska rader -->
        </tbody>
      </table>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // INITIAL DATA
  const ventiler = [
    {id:"VAV1", lat:59.215, lng:17.867, status:"trög", notering:"Snurrar långsamt", rapportor:"Fredrik", foto:"📷"},
    {id:"VAV2", lat:59.218, lng:17.870, status:"trasig", notering:"Saknas nyckelstång", rapportor:"Fredrik", foto:"📷"},
    {id:"VAV3", lat:59.220, lng:17.860, status:"ej", notering:"Bil i vägen", rapportor:"Fredrik", foto:"📷"}
  ];

  const map = L.map('map').setView([59.215,17.867], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'&copy; OpenStreetMap' }).addTo(map);

  const markers = [];

  function updateTable(filter=null, search=""){
    const tbody = document.getElementById('ventilTable');
    tbody.innerHTML = "";
    ventiler.forEach(v=>{
      if(filter && filter!=="all" && v.status!==filter) return;
      if(search && !v.id.toLowerCase().includes(search.toLowerCase())) return;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${v.status}</td><td>${v.notering}</td><td>${v.foto}</td><td>${v.rapportor}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('summaryText').innerHTML = `Foton med plats: ${ventiler.length}<br>Projekt med plats: 1`;
  }

  function updateMarkers(filter=null, search=""){
    markers.forEach(m=>map.removeLayer(m));
    markers.length=0;
    ventiler.forEach(v=>{
      if(filter && filter!=="all" && v.status!==filter) return;
      if(search && !v.id.toLowerCase().includes(search.toLowerCase())) return;
      const color = v.status==="trög"?"orange":v.status==="trasig"?"red":"blue";
      const marker = L.circleMarker([v.lat,v.lng], {radius:8,color:color,fillOpacity:0.7}).addTo(map);
      marker.bindPopup(`<b>${v.id}</b><br>Status: ${v.status}<br>Notering: ${v.notering}<br>Rapportör: ${v.rapportor}`);
      markers.push(marker);
    });
  }

  // EVENT LISTENERS
  document.querySelectorAll('#filters button').forEach(btn=>{
    btn.addEventListener('click',()=> {
      const filter = btn.dataset.filter;
      const search = document.getElementById('searchVAV').value;
      updateTable(filter, search);
      updateMarkers(filter, search);
    });
  });

  document.getElementById('searchVAV').addEventListener('input', e=>{
    const search = e.target.value;
    updateTable(null, search);
    updateMarkers(null, search);
  });

  updateTable();
  updateMarkers();

</script>
</body>
</html>
