<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA System MAX V4</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;}
.hidden{display:none;}

/* NAV */
#nav{display:flex;justify-content:space-between;padding:10px;background:#000;}
#nav button{padding:8px 12px;background:#222;color:#fff;border:none;}

/* PAGES */
.page{padding:10px;height:calc(100vh - 50px);overflow:auto;}

/* FIELD PAGE */
#field input,#field select,#field textarea{
width:100%;padding:10px;margin-top:8px;font-size:16px;
}

#capture{
background:#28a745;
font-size:20px;
padding:20px;
margin-top:10px;
}

#preview{
width:100%;
margin-top:10px;
}

/* ADMIN */
#admin{
display:flex;
flex-direction:column;
}

#map{height:300px;margin-top:10px;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

td,th{
border:1px solid #444;
padding:5px;
}

tr:hover{background:#333;cursor:pointer;}

.filter{
display:flex;
gap:5px;
margin-top:10px;
}

.filter input, .filter select{
flex:1;
padding:6px;
}

/* COLORS */
.trög{color:orange;}
.trasig{color:red;}
.över{color:cyan;}
.ej{color:gray;}

</style>
</head>

<body>

<div id="nav">
<button onclick="showPage('field')">📸 Fält</button>
<button onclick="showPage('admin')">🧠 Admin</button>
</div>

<!-- ================= FIELD ================= -->
<div id="field" class="page">

<h2>📸 Registrera</h2>

<input id="f_id" placeholder="VAV1234">
<select id="f_status">
<option value="trög">Trög</option>
<option value="trasig">Trasig</option>
<option value="över">Överasfalterad</option>
<option value="ej">Ej kontrollerad</option>
</select>

<select id="f_typ">
<option>VAV</option>
<option>VBP</option>
<option>VSP</option>
<option>SV</option>
</select>

<textarea id="f_note" placeholder="Notering..."></textarea>

<input type="file" id="f_foto" accept="image/*" capture="environment">

<img id="preview"/>

<button id="capture">💾 SPARA SNABBT</button>

</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="page hidden">

<h2>🧠 Adminläge</h2>

<div class="filter">
<input id="search" placeholder="Sök...">
<select id="filter">
<option value="all">Alla</option>
<option value="trög">Trög</option>
<option value="trasig">Trasig</option>
<option value="över">Över</option>
<option value="ej">Ej</option>
</select>
</div>

<div id="stats"></div>

<div id="map"></div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Status</th>
<th>Typ</th>
<th>Notering</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= STATE =================
let data = JSON.parse(localStorage.getItem("va_data")||"[]");

// ================= NAV =================
function showPage(p){
document.getElementById("field").classList.add("hidden");
document.getElementById("admin").classList.add("hidden");
document.getElementById(p).classList.remove("hidden");

if(p==="admin"){
setTimeout(initMap,200);
render();
}
}

// ================= FOTO =================
document.getElementById("f_foto").onchange = e=>{
const file = e.target.files[0];
if(!file) return;
const reader = new FileReader();
reader.onload = ev=>{
preview.src = ev.target.result;
}
reader.readAsDataURL(file);
}

// ================= SAVE =================
document.getElementById("capture").onclick = ()=>{
navigator.geolocation.getCurrentPosition(pos=>{

const obj = {
id:f_id.value || "AUTO_"+Date.now(),
status:f_status.value,
typ:f_typ.value,
note:f_note.value,
lat:pos.coords.latitude,
lng:pos.coords.longitude,
foto:preview.src || ""
};

data.push(obj);
localStorage.setItem("va_data",JSON.stringify(data));

alert("Sparad!");

f_id.value="";
f_note.value="";
preview.src="";

});
}

// ================= ADMIN =================
let map;
let markers=[];

function initMap(){
if(map) return;

map = L.map('map').setView([59.215,17.867],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// ================= RENDER =================
function render(){

renderTable();
renderMap();
renderStats();

}

function renderStats(){
const total = data.length;
const trög = data.filter(x=>x.status==="trög").length;
const trasig = data.filter(x=>x.status==="trasig").length;

stats.innerHTML = `
Totalt: ${total} | Tröga: ${trög} | Trasiga: ${trasig}
`;
}

function renderTable(){

table.innerHTML="";

const s = search.value.toLowerCase();
const f = filter.value;

data.forEach(v=>{

if(f!=="all" && v.status!==f) return;
if(!v.id.toLowerCase().includes(s)) return;

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${v.id}</td>
<td class="${v.status}">${v.status}</td>
<td>${v.typ}</td>
<td>${v.note}</td>
`;

tr.onclick = ()=>focusMap(v);

table.appendChild(tr);

});

}

function renderMap(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

const s = search.value.toLowerCase();
const f = filter.value;

data.forEach(v=>{

if(f!=="all" && v.status!==f) return;
if(!v.id.toLowerCase().includes(s)) return;

const color = {
trög:"orange",
trasig:"red",
över:"blue",
ej:"gray"
}[v.status]||"green";

const m = L.circleMarker([v.lat,v.lng],{
radius:8,
color:color
}).addTo(map);

m.bindPopup(`
<b>${v.id}</b><br>
${v.status}<br>
${v.note}<br>
${v.foto ? `<img src="${v.foto}" width="100">`:""}
`);

markers.push(m);

});

}

function focusMap(v){
map.setView([v.lat,v.lng],17);
}

// ================= EVENTS =================
search.oninput = render;
filter.onchange = render;

// ================= INIT =================
showPage("field");

</script>

</body>
</html>
