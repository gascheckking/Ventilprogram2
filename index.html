<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Underhållsprogram VA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white;}
header { background:#0b2447; padding:15px; display:flex; justify-content:space-between;}
button { padding:10px; border:none; border-radius:8px; cursor:pointer;}
.primary { background:#f97316; color:white;}
.secondary { background:#1e293b; color:white;}

.page { display:none; padding:10px;}
.active { display:block;}

#map { height:300px; border-radius:12px;}

.card {
 background:#1e293b;
 padding:15px;
 border-radius:12px;
 margin-top:10px;
}

input, select {
 width:100%;
 padding:10px;
 margin-top:5px;
 border-radius:8px;
 border:none;
}

.badge {
 padding:5px 10px;
 border-radius:8px;
 margin:3px;
 display:inline-block;
 cursor:pointer;
}

.red{background:#ef4444;}
.orange{background:#f97316;}
.yellow{background:#eab308;}
.blue{background:#3b82f6;}
.green{background:#22c55e;}

.list-item {
 background:#111827;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
}

</style>
</head>

<body>

<header>
<div>🏛️ VA Underhåll</div>
<div>
<button onclick="showPage('field')" class="primary">Fältläge</button>
<button onclick="showPage('admin')" class="secondary">Admin</button>
</div>
</header>

<!-- FÄLT -->
<div id="field" class="page active">

<div id="map"></div>

<div class="card">

<h3>Snabb registrering</h3>

<select id="type" onchange="updatePrefix()">
<option value="VAV">VAV</option>
<option value="VBP">VBP</option>
<option value="VSP">VSP</option>
</select>

<input id="number" placeholder="Nummer (t.ex 2392)">
<input id="area" placeholder="Område">

<h4>Status</h4>

<div id="statusContainer"></div>

<select id="subStatus"></select>

<input id="note" placeholder="Notering">

<button onclick="getLocation()">📍 Hämta GPS</button>
<button onclick="takePhoto()">📸 Ta foto</button>

<button class="primary" onclick="save()">💾 Spara</button>

</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<h2>Adminläge</h2>

<select onchange="filter(this.value)">
<option value="ALL">Alla</option>
<option value="TRÖG">Trög</option>
<option value="TRASIG">Trasig</option>
<option value="HITTAR EJ">Hittar ej</option>
</select>

<div id="list"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([59.2,17.8],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

let data = JSON.parse(localStorage.getItem("va_data") || "[]");

let statuses = {
"TRÖG": ["2 Gubbar","Snurrar segt"],
"TRASIG": ["Snurrar","Stum","Saknas"],
"ÖVERTÄCKT": ["Asfalt","Jord","Buskage"],
"BETÄCKNING": ["Trasig","Höjas","Byta"],
"HITTAR EJ": ["Mätas in","Borta"]
};

function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
render();
}

function updatePrefix(){
}

function renderStatus(){
let c = document.getElementById("statusContainer");
c.innerHTML="";
Object.keys(statuses).forEach(s=>{
let b = document.createElement("div");
b.className="badge orange";
b.innerText=s;
b.onclick=()=>selectStatus(s);
c.appendChild(b);
});
}

let selectedStatus="";

function selectStatus(s){
selectedStatus=s;
let sub=document.getElementById("subStatus");
sub.innerHTML="";
statuses[s].forEach(x=>{
let o=document.createElement("option");
o.innerText=x;
sub.appendChild(o);
});
}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

L.marker([lat,lng]).addTo(map);

window.currentPos={lat,lng};
});
}

function takePhoto(){
alert("Kamera öppnas (koppla riktig senare)");
}

function save(){

let type=document.getElementById("type").value;
let num=document.getElementById("number").value;

let obj={
id: Date.now(),
vav: type+num,
area: document.getElementById("area").value,
status:selectedStatus,
sub:document.getElementById("subStatus").value,
note:document.getElementById("note").value,
pos:window.currentPos || null
};

data.push(obj);
localStorage.setItem("va_data", JSON.stringify(data));

alert("Sparad!");
render();

}

function render(){

let list=document.getElementById("list");
if(!list) return;

list.innerHTML="";

data.forEach(d=>{
let div=document.createElement("div");
div.className="list-item";
div.innerHTML=`
<b>${d.vav}</b><br>
${d.status} - ${d.sub}<br>
${d.note || ""}
`;
list.appendChild(div);

if(d.pos){
L.marker([d.pos.lat,d.pos.lng]).addTo(map);
}
});
}

function filter(f){
let list=document.getElementById("list");
list.innerHTML="";

data.filter(d=>f==="ALL"||d.status===f)
.forEach(d=>{
let div=document.createElement("div");
div.className="list-item";
div.innerHTML=`${d.vav} - ${d.status}`;
list.appendChild(div);
});
}

renderStatus();
render();

</script>

</body>
</html>
