<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentilApp PRO MAX</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#eef2f5}
.header{background:#1e4663;color:#fff;padding:16px;font-size:18px;font-weight:600}
.container{max-width:1300px;margin:auto;padding:16px}
.card{background:#fff;padding:16px;border-radius:16px;margin-bottom:16px;box-shadow:0 4px 10px rgba(0,0,0,.05)}
.row{display:flex;gap:10px;flex-wrap:wrap}
input,select{padding:12px;border-radius:12px;border:1px solid #ddd;font-size:14px;flex:1}
button{padding:12px 20px;border-radius:12px;border:none;background:#ff9800;color:#fff;font-weight:600;cursor:pointer}
#map{height:220px;border-radius:14px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f5f5f5;text-align:left}
th,td{padding:10px;border-bottom:1px solid #eee}
.status{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600}
.ok{background:#d4edda}
.bad{background:#f8d7da}
.warn{background:#fff3cd}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.search{max-width:300px}
</style>
</head>
<body>
<div class="header">🚀 VentilApp PRO MAX</div>
<div class="container">

<div class="card">
<div id="map"></div>
</div>

<div class="card">
<div class="row">
<input id="vav" placeholder="VAV nummer">
<select id="status">
<option value="OK">OK</option>
<option value="Trasig">Trasig</option>
<option value="Trög">Trög</option>
<option value="Ej kontrollerad">Ej kontrollerad</option>
</select>
<input id="plats" placeholder="Plats / GPS">
</div>
<br>
<div class="row">
<input id="note" placeholder="Notering...">
<button onclick="saveVentil()">💾 Spara</button>
</div>
</div>

<div class="card">
<div class="toolbar">
<input id="search" class="search" placeholder="Sök VAV / plats..." oninput="render()">
<button onclick="exportData()">📤 Export</button>
</div>
<table>
<thead>
<tr>
<th>VAV</th>
<th>Status</th>
<th>Plats</th>
<th>Notering</th>
<th></th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('ventiler_pro')||'[]')

let map = L.map('map').setView([59.2,17.8],11)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let marker
map.on('click',e=>{
 if(marker) map.removeLayer(marker)
 marker = L.marker(e.latlng).addTo(map)
 document.getElementById('plats').value = e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5)
})

function saveVentil(){
 let v = document.getElementById('vav').value.trim()
 let s = document.getElementById('status').value
 let p = document.getElementById('plats').value
 let n = document.getElementById('note').value

 if(!v) return alert('VAV saknas')

 data.push({id:Date.now(),v,s,p,n})
 localStorage.setItem('ventiler_pro',JSON.stringify(data))
 clearForm()
 render()
}

function clearForm(){
 document.getElementById('vav').value=''
 document.getElementById('note').value=''
}

function render(){
 let q = document.getElementById('search').value.toLowerCase()
 let html=''
 data
 .filter(d=> d.v.toLowerCase().includes(q) || d.p.toLowerCase().includes(q))
 .forEach(d=>{
 let cls = d.s=='OK'?'ok':d.s=='Trasig'?'bad':'warn'
 html+=`<tr>
 <td><b>${d.v}</b></td>
 <td><span class="status ${cls}">${d.s}</span></td>
 <td>${d.p}</td>
 <td>${d.n||''}</td>
 <td><button onclick="remove(${d.id})">🗑️</button></td>
 </tr>`
 })
 document.getElementById('list').innerHTML=html
}

function remove(id){
 data = data.filter(d=>d.id!=id)
 localStorage.setItem('ventiler_pro',JSON.stringify(data))
 render()
}

function exportData(){
 let text = data.map(d=>`${d.v} | ${d.s} | ${d.p} | ${d.n}`).join('\n')
 navigator.clipboard.writeText(text)
 alert('Kopierat!')
}

render()
</script>
</body>
</html>
